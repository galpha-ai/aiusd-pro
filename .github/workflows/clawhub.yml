name: Publish to ClawHub

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate
        run: npx -y clawhub login --token "$CLAWHUB_TOKEN" --no-browser --registry https://www.clawhub.ai
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skill
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TMPDIR=$(mktemp -d)
          cp SKILL.md "$TMPDIR/SKILL.md"
          npx -y clawhub publish "$TMPDIR" --slug aiusd-pro --name "AIUSD Pro" --version "$VERSION" --tags latest --no-input --registry https://www.clawhub.ai
